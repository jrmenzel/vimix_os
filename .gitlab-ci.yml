stages:
  - initial_checks
  - build
  - usertests

default:
  image: pandora:5050/robert/vimixos/ci-image:24.04
  tags: ["docker"]

variables:
  BUILD_PARAMS: '-j $(nproc) EXTERNAL_KERNEL_FLAGS=-D_SHUTDOWN_ON_PANIC'

#before_script:
#  - echo starting

# needs clang 20 or newer, so requires Ubuntu 25.04 or newer
format:
  image: pandora:5050/robert/vimixos/ci-image:25.04
  allow_failure: true
  stage: initial_checks
  script:
    - tools/tests/check_formatting.sh

# build with GCC analyzer and boot VIMIX on a recent Ubuntu
build_analyze_2504:
  image: pandora:5050/robert/vimixos/ci-image:25.04
  stage: initial_checks
  script:
    - eval "make $BUILD_PARAMS ANALYZE=1"
  artifacts:
    paths:
      - build/filesystem.img
      - build/boot/kernel-vimix
      - build_host/root/usr/bin/mkfs
    when: always
    expire_in: 1 week

# Build all platforms on GCC 13
build_qemu32_deb:
  image: pandora:5050/robert/vimixos/ci-image:24.04
  stage: build
  script:
    - eval "make $BUILD_PARAMS PLATFORM=qemu32 BUILD_TYPE=debug"
  artifacts:
    paths:
      - build/filesystem.img
      - build/boot/kernel-vimix
      - build_host/root/usr/bin/mkfs
    when: always
    expire_in: 1 week

