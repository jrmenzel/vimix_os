# tests

usertests_release:
  image: pandora:5050/robert/vimixos/ci-image:24.04
  stage: usertests
  needs:
    - job: build_qemu64_rel
      artifacts: true
  script:
    - ./tools/tests/run_test.sh usertests.sh qemu64 "ALL TESTS PASSED"
  artifacts:
    paths:
      - build/logs/
    when: always
    expire_in: 1 week

